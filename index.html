<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Pro</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; position: fixed; background: #000;
        }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 3000;
            transition: opacity 0.8s ease;
        }

        .logo-gusto {
            width: 250px; height: auto; margin-bottom: 35px;
            filter: drop-shadow(0 4px 8px rgba(255,255,255,0.3));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

        .mensaje-carga {
            color: #fff; font-family: 'Segoe UI', sans-serif;
            margin-bottom: 25px; letter-spacing: 2px; font-size: 14px;
            text-transform: uppercase; text-align: center;
        }

        .loader-bar { width: 200px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; margin-top: 20px; }
        .loader-progress { width: 0%; height: 100%; background: linear-gradient(90deg, #00d4ff, #25D366); animation: progress 6s linear infinite; box-shadow: 0 0 10px rgba(0,212,255,0.5); }
        @keyframes progress { 0% { width: 0%; } 50% { width: 70%; } 100% { width: 100%; } }

        #plato-info {
            position: fixed; top: 40px; width: 100%; text-align: center;
            color: white; font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9); z-index: 1000; opacity: 0; transition: all 0.5s;
        }
        #plato-info.show { opacity: 1; transform: translateY(10px); }

        #ui-overlay {
            position: fixed; bottom: 40px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 30px; z-index: 1000;
            opacity: 0; transition: opacity 0.5s ease;
        }
        #ui-overlay.show { opacity: 1; display: flex !important; }
        
        .btn-gusto {
            padding: 18px 30px; background: linear-gradient(45deg, #25D366, #128C7E);
            color: white; border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50px; font-weight: bold; font-size: 16px;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: all 0.3s ease; user-select: none;
        }
        .btn-gusto:active { transform: scale(0.9); }
    </style>
</head>

<body>
    <div id="loading-screen">
        <img src="logo-banco.jpg" class="logo-gusto" alt="Logo Gustó3D" id="main-logo">
        <div class="mensaje-carga" id="mensaje-carga">INICIANDO EXPERIENCIA...</div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>

    <div id="plato-info">Cargando Plato...</div>

    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">← Anterior</button>
        <button class="btn-gusto" id="btn-next">Siguiente →</button>
    </div>

    <!-- 🛡️ A-SCENE ANTI-TREMOR COMPLETO -->
    <a-scene 
        id="scene"
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; 
                      filterMinCF: 0.001; filterBeta: 0.005; matrixSmoothing: 0.9;"
        embedded
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true; physicallyCorrectLights: true; antialias: false;">
      
        <a-light type="ambient" intensity="1.0"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1.2"></a-light>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- 🛡️ ESTRUCTURA ESTABLE ANTI-TREMOR -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="model-container" position="0 0 0.12" rotation="90 0 0">
                <a-gltf-model id="visor" position="0 0 0" shadow="receive: true" dynamic="true"></a-gltf-model>
            </a-entity>
        </a-entity>
    </a-scene>

<script>
    // 🎯 ELEMENTOS
    const loader = document.getElementById("loading-screen");
    const ui = document.getElementById("ui-overlay");
    const visor = document.getElementById("visor");
    const modelContainer = document.getElementById("model-container");
    const mensajeCarga = document.getElementById("mensaje-carga");
    const platoInfo = document.getElementById("plato-info");
    const scene = document.getElementById("scene");
    
    let catalogo = [];
    let platoActual = 0;

    console.log("🚀 Gustó3D Pro v2.0");

    // 1. CARGAR JSON
    async function cargarMenu() {
        try {
            mensajeCarga.textContent = "🔗 CARGANDO MENÚ...";
            const response = await fetch('./menu.json');
            const datos = await response.json();
            catalogo = datos.platos || [];
            console.log("✅ Catálogo:", catalogo.map(p => p.nombre));
            
            mensajeCarga.textContent = "🍽️ PRECARGANDO MODELOS...";
            
            // Preload
            catalogo.forEach(plato => {
                const link = document.createElement('link');
                link.rel = 'preload'; link.href = plato.archivo; link.as = 'fetch';
                link.type = 'model/gltf-binary';
                document.head.appendChild(link);
            });
            
            setTimeout(iniciarApp, 800);
            
        } catch (error) {
            console.error("❌ Error JSON:", error);
            mensajeCarga.textContent = "FALLBACK MODE";
            catalogo = [{
                nombre: "Demo", archivo: "https://raw.githubusercontent.com/Gusto3d-menu/gusto3d-assets/main/food.glb",
                pos: "0 0 0.1", escala: "6 6 6", rot_inicial: "90 0 0", rot_final: "90 360 0", velocidad: 12000
            }];
            setTimeout(iniciarApp, 1500);
        }
    }

    // 2. CAMBIO DE PLATO CORREGIDO ✅
    function cambiarPlato(direccion) {
        if (!catalogo.length) {
            console.log("⚠️ Sin platos");
            return;
        }

        platoActual = (platoActual + direccion + catalogo.length) % catalogo.length;
        const plato = catalogo[platoActual];
        
        console.log(`🔄 Cargando: ${plato.nombre} (${plato.archivo})`);

        // Fade out
        if (modelContainer) modelContainer.setAttribute("scale", "0.2 0.2 0.2");
        
        setTimeout(() => {
            // Cambiar modelo
            visor.setAttribute("gltf-model", plato.archivo);
            
            // Aplicar propiedades del JSON
            if (modelContainer) {
                modelContainer.setAttribute("position", plato.pos || "0 0 0.1");
                modelContainer.setAttribute("rotation", plato.rot_inicial || "90 0 0");
            }
            
            visor.setAttribute("scale", plato.escala || "6 6 6");
            
            // ROTACIÓN PERSONALIZADA
            visor.setAttribute("animation__rotate", {
                property: "rotation",
                from: plato.rot_inicial || "90 0 0",
                to: plato.rot_final || "90 360 0",
                dur: plato.velocidad || 12000,
                loop: true,
                easing: "linear",
                autoplay: true
            });
            
            // Fade in
            if (modelContainer) {
                modelContainer.setAttribute("animation__scale", {
                    property: "scale",
                    to: "1 1 1",
                    dur: 600,
                    easing: "easeOutBack"
                });
            }
            
            // UI
            platoInfo.textContent = plato.nombre;
            platoInfo.classList.remove("show");
            setTimeout(() => platoInfo.classList.add("show"), 100);
            
            console.log(`✅ ${plato.nombre} listo`);
            
        }, 300);
    }

    // 3. INICIO APP
    function iniciarApp() {
        console.log("🎬 Iniciando...");
        
        document.getElementById("btn-prev").onclick = () => cambiarPlato(-1);
        document.getElementById("btn-next").onclick = () => cambiarPlato(1);

        // Primer plato
        if (catalogo.length) cambiarPlato(0);

        // Loader 6s progresivo
        const mensajes = ["🔗 AR CONECTADO", "📱 CÁMARA OK", "🍽️ MODELOS LISTOS", "✨ EFECTOS 3D", "✅ GUSTÓ3D PRO"];
        let i = 0;
        const int = setInterval(() => {
            if (i < mensajes.length) {
                mensajeCarga.textContent = mensajes[i];
                i++;
            }
        }, 1100);

        setTimeout(() => {
            clearInterval(int);
            loader.style.opacity = "0";
            setTimeout(() => {
                loader.style.display = "none";
                ui.classList.add("show");
                platoInfo.classList.add("show");
            }, 1000);
        }, 6000);
    }

    // 🛡️ ANTI-TREMOR + DEBUG
    function estabilizar() {
        if (modelContainer && visor.object3D) {
            const pos = modelContainer.getAttribute('position');
            modelContainer.setAttribute('position', `${pos.x.toFixed(2)} ${pos.y.toFixed(2)} ${pos.z.toFixed(2)}`);
        }
    }

    // INICIO
    document.addEventListener('DOMContentLoaded', () => {
        console.log("📱 DOM listo");
        cargarMenu();
    });

    // Events
    scene.addEventListener('loaded', () => {
        setInterval(estabilizar, 40);
        console.log("🛡️ Estabilizador activo");
    });
    
    scene.addEventListener('arReady', () => console.log("✅ AR listo"));
    scene.addEventListener('targetFound', () => console.log("🎯 Target OK"));
</script>
</body>
</html>
