<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D Pro - Experiencia RA</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background-color: #000; }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0a192f 0%, #000000 100%); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 3000;
            transition: opacity 0.8s ease;
        }

        .logo-gusto {
            width: 240px; height: auto; margin-bottom: 30px;
            filter: drop-shadow(0 0 12px rgba(0, 150, 255, 0.5));
            animation: float 3s infinite ease-in-out;
        }

        .mensaje-carga {
            color: #ffffff; font-family: 'Segoe UI', sans-serif; 
            margin-bottom: 25px; letter-spacing: 2px; font-size: 14px;
            font-weight: 300; text-transform: uppercase;
        }

        .loader-bar { width: 200px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        .loader-progress { width: 100%; height: 100%; background: #00d4ff; animation: loading 2s infinite; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        #info-plato { 
            position: fixed; top: 0; width: 100%; text-align: center; 
            color: white; background: rgba(0,0,0,0.85); padding: 25px 0; 
            z-index: 1000; font-family: 'Segoe UI', sans-serif; 
            font-weight: bold; text-transform: uppercase; letter-spacing: 3px;
            display: none;
        }

        #ui-overlay { 
            position: fixed; bottom: 40px; left: 0; width: 100%; 
            display: flex; justify-content: center; gap: 30px; z-index: 1000;
            display: none; 
        }

        .btn-gusto { 
            padding: 18px 40px; background: #25D366; color: white; 
            border: 2px solid white; border-radius: 50px; font-weight: bold; 
            cursor: pointer; box-shadow: 0px 8px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>
    <div id="loading-screen">
        <img src="https://i.postimg.cc/8z0K9T7t/gusto3d-transparent.png" class="logo-gusto" alt="Logo Gustó3D">
        <div class="mensaje-carga">Preparando experiencia Gustó3D</div>
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <div id="info-plato">SINCRONIZANDO...</div>

    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">←</button>
        <button class="btn-gusto" id="btn-next">→</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; filterMinCF: 1; filterBeta: 0;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true; physicallyCorrectLights: true; antialias: false; precision: low; powerPreference: high-performance;">
      
        <a-light type="ambient" intensity="1.8"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1.2"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model id="visor"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const URL_BASE = "https://raw.githubusercontent.com/Gusto3d-menu/gusto3d-assets/main/";
        
        const catalogo = [
            { nombre: "Sándwich Gourmet", archivo: "food.glb", pos: "0 -0.8 0", esc: "1.2 1.2 1.2", rot: "90 0 0" },
            { nombre: "Postre Especial", archivo: "postre.glb", pos: "0 -0.5 0.3", esc: "1.6 1.6 1.6", rot: "90 45 0" }
        ];

        let index = 0;
        const visor = document.querySelector("#visor");
        const texto = document.querySelector("#info-plato");
        const ui = document.querySelector("#ui-overlay");
        const loader = document.querySelector("#loading-screen");

        function actualizarPlato() {
            const item = catalogo[index];
            visor.setAttribute("src", URL_BASE + item.archivo);
            visor.setAttribute("position", item.pos);
            visor.setAttribute("scale", item.esc);
            visor.setAttribute("rotation", item.rot);
            texto.innerText = "GUSTÓ3D: " + item.nombre;
        }

        document.querySelector('a-scene').addEventListener('arReady', () => {
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => {
                    loader.style.display = "none";
                    texto.style.display = "block";
                    ui.style.display = "flex";
                }, 800);
                texto.innerText = "APUNTA AL LOGO";
            }, 2500); 
        });

        actualizarPlato();

        document.querySelector("#btn-next").addEventListener('click', () => {
            index = (index + 1) % catalogo.length;
            actualizarPlato();
        });

        document.querySelector("#btn-prev").addEventListener('click', () => {
            index = (index - 1 + catalogo.length) % catalogo.length;
            actualizarPlato();
        });
    </script>
</body>
</html>
