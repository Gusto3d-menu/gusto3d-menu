<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Pro</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background: #000; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; transition: opacity 0.8s ease; }
        .logo-gusto { width: 200px; height: auto; margin-bottom: 20px; }
        .mensaje-carga { color: #fff; font-family: sans-serif; letter-spacing: 2px; font-size: 12px; text-transform: uppercase; }
        #plato-info { position: fixed; top: 40px; width: 100%; text-align: center; color: white; font-family: sans-serif; font-size: 20px; font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.9); z-index: 1000; opacity: 0; transition: 0.5s; }
        #plato-info.show { opacity: 1; }
        #ui-overlay { position: fixed; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 1000; opacity: 0; transition: 0.5s; }
        #ui-overlay.show { opacity: 1; }
        .btn-gusto { padding: 15px 25px; background: linear-gradient(45deg, #25D366, #128C7E); color: white; border: 2px solid #fff; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
    </style>
</head>

<body>
    <div id="loading-screen">
        <img src="logo-banco.jpg" class="logo-gusto" alt="Logo">
        <div class="mensaje-carga" id="mensaje-carga">CARGANDO...</div>
    </div>

    <div id="plato-info"></div>

    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">←</button>
        <button class="btn-gusto" id="btn-next">→</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model id="visor"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const visor = document.getElementById("visor");
        const info = document.getElementById("plato-info");
        let catalogo = [];
        let platoActual = 0;

        async function iniciar() {
            try {
                const res = await fetch('./menu.json');
                const data = await res.json();
                catalogo = data.platos;
                configurarBotones();
                cambiarPlato(0);
                document.getElementById("loading-screen").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("loading-screen").style.display = "none";
                    document.getElementById("ui-overlay").classList.add("show");
                }, 800);
            } catch (e) { console.error("Error al cargar menú"); }
        }

        function cambiarPlato(dir) {
            if (!catalogo.length) return;
            platoActual = (platoActual + dir + catalogo.length) % catalogo.length;
            const p = catalogo[platoActual];

            // 1. Reset para el efecto de "aparición mágica"
            visor.setAttribute("scale", "0.01 0.01 0.01");
            
            // 2. Cargar modelo y posición
            visor.setAttribute("gltf-model", p.archivo);
            visor.setAttribute("position", p.pos);
            
            // 3. ROTACIÓN HORIZONTAL CONTINUA (Eje Y)
            visor.setAttribute("animation__rotate", {
                property: "rotation",
                from: p.rot_inicial,
                to: p.rot_final,
                dur: p.velocidad || 12000,
                loop: true,
                easing: "linear"
            });

            // 4. ✨ ANIMACIÓN DE ENTRADA (Rebote Elástico)
            visor.setAttribute("animation__scale", {
                property: "scale",
                to: p.escala,
                dur: p.anim_dur || 1100,
                easing: "easeOutElastic" 
            });

            // 5. ✨ EFECTO "GLOW" (Sutil pulso de respiración)
            // Esto hace que el plato se vea dinámico mientras gira
            visor.setAttribute("animation__glow", {
                property: "scale",
                from: p.escala,
                to: multiplicarEscala(p.escala, 1.05),
                dir: "alternate",
                dur: 2000,
                loop: true,
                easing: "easeInOutSine"
            });

            info.textContent = p.nombre;
            info.classList.add("show");
        }

        // Función auxiliar para el efecto de pulso
        function multiplicarEscala(escalaStr, factor) {
            const parts = escalaStr.split(' ').map(n => parseFloat(n) * factor);
            return `${parts[0]} ${parts[1]} ${parts[2]}`;
        }

        function configurarBotones() {
            document.getElementById("btn-prev").onclick = () => cambiarPlato(-1);
            document.getElementById("btn-next").onclick = () => cambiarPlato(1);
        }

        document.addEventListener('DOMContentLoaded', iniciar);
    </script>
</body>
</html>
