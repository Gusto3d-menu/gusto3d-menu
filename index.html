<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gustó3D - Vista Final</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        /* Limpieza total de márgenes para evitar franjas negras */
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        #info-plato {
            position: fixed; top: 0; width: 100%; text-align: center;
            color: white; background: rgba(0,0,0,0.7); padding: 15px 0;
            z-index: 100; font-family: sans-serif; font-weight: bold;
        }

        #ui-overlay {
            position: fixed; bottom: 30px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 20px; z-index: 100;
        }

        .btn-gusto {
            padding: 15px 25px; background: #25D366; color: white;
            border: 2px solid white; border-radius: 12px; font-weight: bold;
            cursor: pointer;
        }

        /* Bloqueo estricto del botón de VR */
        .a-enter-vr, .a-enter-ar { display: none !important; }
        
        /* Forzar que el lienzo de la cámara sea transparente y visible */
        canvas { width: 100% !important; height: 100% !important; }
    </style>
</head>

<body>
    <div id="info-plato">ESCANEA EL LOGO</div>

    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">Anterior</button>
        <button class="btn-gusto" id="btn-next">Siguiente</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: yes;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true"
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
      
        <a-light type="ambient" intensity="1"></a-light>
        <a-light type="directional" position="0 2 1" intensity="0.5"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model id="visor" position="0 0 0" rotation="0 0 0" scale="1 1 1"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const URL_BASE = "https://raw.githubusercontent.com/Gusto3d-menu/gusto3d-assets/main/";
        const catalogo = [
            { nombre: "Sándwich", archivo: "food.glb", escala: "1 1 1" },
            { nombre: "Postre", archivo: "postre.glb", escala: "1.2 1.2 1.2" }
        ];

        let index = 0;
        const visor = document.querySelector("#visor");
        const texto = document.querySelector("#info-plato");

        function actualizarPlato() {
            const item = catalogo[index];
            const rutaFinal = URL_BASE + item.archivo;
            
            visor.setAttribute("src", rutaFinal);
            visor.setAttribute("scale", item.escala);
            texto.innerText = "MENÚ: " + item.nombre;
        }

        // Carga automática al iniciar
        window.addEventListener('load', () => {
            setTimeout(actualizarPlato, 1000);
        });

        document.querySelector("#btn-next").addEventListener('click', () => {
            index = (index + 1) % catalogo.length;
            actualizarPlato();
        });

        document.querySelector("#btn-prev").addEventListener('click', () => {
            index = (index - 1 + catalogo.length) % catalogo.length;
            actualizarPlato();
        });
    </script>
</body>
</html>
