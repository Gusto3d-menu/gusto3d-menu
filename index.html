<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Visualizador AR Final</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; position: fixed; background-color: #000;
        }

        /* Ajuste para eliminar la franja blanca */
        #mindar-image-video {
            width: 100% !important; height: 100% !important;
            object-fit: cover !important; position: fixed !important;
            top: 0; left: 0; z-index: -1;
        }

        #info-plato {
            position: fixed; top: 0; width: 100%; text-align: center;
            color: white; background: rgba(0,0,0,0.8); padding: 25px 0;
            z-index: 1000; font-family: sans-serif; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
        }

        #ui-overlay {
            position: fixed; bottom: 40px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 30px; z-index: 1000;
        }

        .btn-gusto {
            padding: 18px 35px; background: #25D366; color: white;
            border: 3px solid white; border-radius: 50px; font-weight: bold;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.4); cursor: pointer;
            text-transform: uppercase; font-size: 1em;
        }

        .btn-gusto:active { transform: scale(0.9); background: #128C7E; }

        .a-enter-vr, .a-enter-ar, .a-enter-vr-button, .a-orientation-modal { display: none !important; }
    </style>
</head>

<body>
    <div id="info-plato">INICIANDO...</div>

    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">← Anterior</button>
        <button class="btn-gusto" id="btn-next">Siguiente →</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; filterMinCF:0.001; filterBeta: 0.01; missTolerance: 50" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true, logarithmicDepthBuffer: true; alpha: true">
      
        <a-light type="ambient" intensity="1.5"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1.0"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model 
                id="visor" 
                src="" 
                position="0 -0.5 -0.5" 
                rotation="0 90 0" 
                scale="1.5 1.5 1.5"
                animation="property: rotation; to: 90 360 0; dur: 10000; easing: linear; loop: true">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const URL_BASE = "https://raw.githubusercontent.com/Gusto3d-menu/gusto3d-assets/main/";
        const catalogo = [
            { nombre: "Sándwich Gourmet", archivo: "food.glb" },
            { nombre: "Postre Especial", archivo: "postre.glb" }
        ];

        let index = 0;
        const visor = document.querySelector("#visor");
        const texto = document.querySelector("#info-plato");

        function actualizarPlato() {
            const item = catalogo[index];
            visor.setAttribute("src", URL_BASE + item.archivo);
            texto.innerText = "ESTÁS VIENDO: " + item.nombre;
        }

        // Eventos de inicio
        document.querySelector('a-scene').addEventListener('arReady', () => {
            texto.innerText = "APUNTA AL LOGO DE GUSTÓ3D";
            document.body.style.backgroundColor = "transparent";
        });

        // Inicializar
        actualizarPlato();

        // Botones
        document.querySelector("#btn-next").addEventListener('click', () => {
            index = (index + 1) % catalogo.length;
            actualizarPlato();
        });

        document.querySelector("#btn-prev").addEventListener('click', () => {
            index = (index - 1 + catalogo.length) % catalogo.length;
            actualizarPlato();
        });
    </script>
</body>
</html>
