<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Pro</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background-color: #0d1117; }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0d1117 0%, #000000 100%); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 3000;
            transition: opacity 1s ease;
        }

        .logo-gusto {
            width: 250px; height: auto; margin-bottom: 35px;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.5));
            animation: float 3s infinite ease-in-out;
            /* El logo inicia invisible y aparece solo cuando carga */
            opacity: 0; transition: opacity 0.5s;
        }

        .mensaje-carga {
            color: #ffffff; font-family: 'Segoe UI', sans-serif; 
            margin-bottom: 25px; letter-spacing: 3px; font-size: 12px;
            font-weight: 300; text-transform: uppercase;
        }

        .loader-bar { width: 180px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        .loader-progress { width: 100%; height: 100%; background: #00d4ff; animation: loading 2s infinite ease-in-out; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        #ui-overlay { 
            position: fixed; bottom: 50px; left: 0; width: 100%; 
            display: flex; justify-content: center; gap: 40px; z-index: 1000;
            display: none; opacity: 0; transition: opacity 1s;
        }

        .btn-gusto { 
            width: 65px; height: 65px; background: rgba(37, 211, 102, 0.9); 
            color: white; border: 2px solid white; border-radius: 50%; 
            font-size: 24px; font-weight: bold; cursor: pointer;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>

<body>
    <div id="loading-screen">
        <img src="logo-blanco.png" id="main-logo" class="logo-gusto" alt="Logo Gustó3D" onload="this.style.opacity='1'">
        <div class="mensaje-carga" id="status-text">PREPARANDO EXPERIENCIA GUSTÓ3D</div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>

    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">‹</button>
        <button class="btn-gusto" id="btn-next">›</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; filterMinCF: 0.00001; filterBeta: 0.1;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; precision: mediump; logarithmicDepthBuffer: true;">
      
        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1.5"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="anchor-wrapper" animation="property: rotation; to: 0 360 0; dur: 15000; easing: linear; loop: true">
                <a-gltf-model id="visor" rotation="90 0 0"></a-gltf-model>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        // TRUCO DE CACHÉ: Si el logo no aparece, le añadimos un parámetro aleatorio para forzar descarga
        const logo = document.getElementById('main-logo');
        logo.src = "logo-blanco.png?v=" + new Date().getTime();

        const URL_BASE = "https://raw.githubusercontent.com/Gusto3d-menu/gusto3d-assets/main/";
        const catalogo = [
            { nombre: "Sándwich Gourmet", archivo: "food.glb", pos: "0 -0.8 0.1", esc: "1.2 1.2 1.2", rot: "90 0 0" },
            { nombre: "Postre Especial", archivo: "postre.glb", pos: "0 -0.4 0.4", esc: "1.7 1.7 1.7", rot: "90 45 0" }
        ];

        let index = 0;
        const visor = document.querySelector("#visor");
        const ui = document.querySelector("#ui-overlay");
        const loader = document.querySelector("#loading-screen");

        function actualizarPlato() {
            const item = catalogo[index];
            visor.setAttribute("src", URL_BASE + item.archivo);
            visor.setAttribute("position", item.pos);
            visor.setAttribute("scale", item.esc);
            visor.setAttribute("rotation", item.rot);
        }

        document.querySelector('a-scene').addEventListener('arReady', () => {
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => {
                    loader.style.display = "none";
                    ui.style.display = "flex";
                    ui.style.opacity = "1";
                }, 1000);
            }, 2500); 
        });

        actualizarPlato();
        document.querySelector("#btn-next").addEventListener('click', () => { index = (index + 1) % catalogo.length; actualizarPlato(); });
        document.querySelector("#btn-prev").addEventListener('click', () => { index = (index - 1 + catalogo.length) % catalogo.length; actualizarPlato(); });
    </script>
</body>
</html>
