<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Pro</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; position: fixed; background: #000; 
        }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 3000;
            transition: opacity 0.8s ease;
        }

        .logo-gusto {
            width: 250px; height: auto; margin-bottom: 35px;
            filter: drop-shadow(0 4px 8px rgba(255,255,255,0.3));
        }

        .mensaje-carga {
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin-bottom: 25px; letter-spacing: 2px; font-size: 14px;
            text-transform: uppercase; text-align: center;
        }

        .loader-bar { 
            width: 200px; height: 4px; background: rgba(255,255,255,0.2); 
            border-radius: 10px; overflow: hidden; 
        }
        .loader-progress { 
            width: 100%; height: 100%; background: linear-gradient(90deg, #00d4ff, #25D366);
            animation: loading 2.5s infinite ease-in-out; 
        }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        #ui-overlay { 
            position: fixed; bottom: 40px; left: 0; width: 100%; 
            display: flex; justify-content: center; gap: 30px; z-index: 1000;
            opacity: 0; transition: opacity 0.5s ease;
        }
        #ui-overlay.show { opacity: 1; display: flex !important; }
        
        .btn-gusto { 
            padding: 18px 35px; background: linear-gradient(45deg, #25D366, #128C7E);
            color: white; border: 2px solid rgba(255,255,255,0.8); 
            border-radius: 50px; font-weight: bold; font-size: 18px;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 8px 25px rgba(37,211,102,0.4);
            transition: all 0.3s ease; user-select: none;
        }
        .btn-gusto:active { transform: scale(0.95); box-shadow: 0 4px 15px rgba(37,211,102,0.6); }

        #plato-info {
            position: fixed; top: 40px; left: 20px; right: 20px;
            color: white; font-family: 'Segoe UI', sans-serif;
            font-size: 18px; font-weight: bold; text-align: center;
            opacity: 0; transition: opacity 0.5s ease; z-index: 1000;
        }
        #plato-info.show { opacity: 1; }
    </style>
</head>

<body>
    <div id="loading-screen">
        <img src="logo-banco.jpg" class="logo-gusto" alt="Logo Gustó3D" id="main-logo">
        <div class="mensaje-carga">PREPARANDO EXPERIENCIA GUSTÓ3D</div>
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <div id="plato-info"></div>
    
    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">← Anterior</button>
        <button class="btn-gusto" id="btn-next">Siguiente →</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; filterMinCF: 0.00001; filterBeta: 0.1;" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true;">
      
        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1.5"></a-light>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model id="visor" shadow="receive: true" preload="true"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        // 🎯 VARIABLES GLOBALES
        let catalogo = [];
        let platoActual = 0;
        let modelosPrecargados = new Map();
        const visor = document.getElementById("visor");
        const loader = document.getElementById("loading-screen");
        const ui = document.getElementById("ui-overlay");
        const platoInfo = document.getElementById("plato-info");

        // 🚀 CARGA OPTIMIZADA DEL MENÚ
        async function cargarMenu() {
            try {
                const response = await fetch('./menu.json');
                const menu = await response.json();
                
                catalogo = menu.platos;
                // Precargar TODOS los modelos en background
                precargarModelos(menu.config.url_base);
                
                console.log(`✅ Menú cargado: ${catalogo.length} platos`);
                cambiarPlato(0); // Inicializar primer plato
            } catch (error) {
                console.error('❌ Error cargando menú:', error);
                // Fallback si menu.json falla
                cargarCatalogoHardcoded();
            }
        }

        // ⚡ PRECARGAR MODELOS (ELIMINA LAG)
        async function precargarModelos(urlBase) {
            for (const plato of catalogo) {
                try {
                    const url = `${urlBase}${plato.archivo}`;
                    // Crear modelo invisible para precarga
                    const preloadModel = document.createElement('a-asset-item');
                    preloadModel.setAttribute('id', `preload-${plato.id}`);
                    preloadModel.setAttribute('src', url);
                    document.querySelector('a-scene').appendChild(preloadModel);
                    
                    modelosPrecargados.set(plato.id, url);
                    console.log(`🔄 Precargando: ${plato.nombre}`);
                } catch (error) {
                    console.warn(`⚠️ No se pudo precargar: ${plato.nombre}`);
                }
            }
        }

        // 🔄 CAMBIO DE PLATO ULTRA-RÁPIDO
        function cambiarPlato(direccion) {
            platoActual = (platoActual + direccion + catalogo.length) % catalogo.length;
            const plato = catalogo[platoActual];
            
            // Cambios INSTANTÁNEOS (modelos ya precargados)
            visor.setAttribute("src", `#preload-${plato.id}`);
            visor.setAttribute("position", plato.pos);
            visor.setAttribute("scale", plato.escala);
            visor.setAttribute("rotation", plato.rot);
            
            // Actualizar UI
            platoInfo.textContent = `${plato.nombre} - ${plato.descripcion}`;
            platoInfo.classList.add('show');
            
            console.log(`✅ Mostrando: ${plato.nombre}`);
        }

        // 🛡️ FALLBACK (si menu.json no carga)
        function cargarCatalogoHardcoded() {
            catalogo = [
                { nombre: "Sándwich Gourmet", archivo: "food.glb", pos: "0 0 0.1", escala: "15 15 15", rot: "90 0 0" },
                { nombre: "Postre Especial", archivo: "postre.glb", pos: "0 0 0.2", escala: "10 10 10", rot: "90 0 0" }
            ];
            cambiarPlato(0);
        }

        // 🎬 EVENTOS
        document.getElementById("btn-prev").onclick = () => cambiarPlato(-1);
        document.getElementById("btn-next").onclick = () => cambiarPlato(1);

        // 🚀 SECUENCIA DE INICIO
        setTimeout(() => {
            loader.style.opacity = "0";
            setTimeout(() => {
                loader.style.display = "none";
                ui.classList.add("show");
                cargarMenu(); // Cargar menú después de splash
            }, 800);
        }, 3500);

        // 📱 AR READY
        document.querySelector('a-scene').addEventListener('arReady', () => {
            console.log("✅ Sistema AR Gustó3D listo - Precarga completada");
        });
    </script>
</body>
</html>
