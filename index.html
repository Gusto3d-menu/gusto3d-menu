<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Pro Fijo</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background: #000; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; transition: opacity 0.8s ease; }
        .logo-gusto { width: 200px; height: auto; margin-bottom: 20px; }
        .mensaje-carga { color: #fff; font-family: sans-serif; letter-spacing: 2px; font-size: 12px; text-transform: uppercase; }
        #plato-info { position: fixed; top: 40px; width: 100%; text-align: center; color: white; font-family: sans-serif; font-size: 20px; font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.9); z-index: 1000; opacity: 0; transition: 0.5s; }
        #plato-info.show { opacity: 1; }
        #ui-overlay { position: fixed; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 1000; opacity: 0; transition: 0.5s; }
        #ui-overlay.show { opacity: 1; }
        .btn-gusto { padding: 15px 25px; background: linear-gradient(45deg, #25D366, #128C7E); color: white; border: 2px solid #fff; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .en-preparacion {
            color: #ff6b35 !important;
            font-size: 18px !important;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="logo-banco.jpg" class="logo-gusto" alt="Logo">
        <div class="mensaje-carga" id="mensaje-carga">CARGANDO...</div>
    </div>

    <div id="plato-info"></div>

    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">←</button>
        <button class="btn-gusto" id="btn-next">→</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; filterMinCF: 0.001; filterBeta: 0.01;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="contenedor-estabilizador" scale="0.01 0.01 0.01">
                <a-gltf-model id="visor" gltf-model-error="#model-error"></a-gltf-model>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const visor = document.getElementById("visor");
        const contenedor = document.getElementById("contenedor-estabilizador");
        const info = document.getElementById("plato-info");
        let catalogo = [];
        let platoActual = 0;

        // 🔧 FUNCIÓN CLAVE: LIMPIAR TODO ANTES DE CARGAR
        function resetModelo() {
            // Remover animaciones
            contenedor.removeAttribute('animation');
            visor.removeAttribute('animation');
            
            // Reset escala y posición
            contenedor.setAttribute('scale', '0.01 0.01 0.01');
            contenedor.setAttribute('position', '0 0 0');
            
            // Remover modelo actual
            visor.removeAttribute('gltf-model');
        }

        async function verificarModelo(url) {
            try {
                const controller = new AbortController();
                setTimeout(() => controller.abort(), 3000); // Timeout 3s
                const response = await fetch(url, { 
                    method: 'HEAD',
                    signal: controller.signal 
                });
                return response.ok;
            } catch (e) {
                return false;
            }
        }

        // ✅ EVENTO model-loaded (SE CONFIGURA UNA SOLA VEZ)
        visor.addEventListener('model-loaded', function() {
            console.log('✅ Modelo cargado:', catalogo[platoActual]?.nombre);
            const p = catalogo[platoActual];
            
            // POSICIÓN FINAL
            contenedor.setAttribute('position', p.pos);
            
            // ANIMACIÓN ESCALA (DESPUÉS de cargar)
            contenedor.setAttribute('animation__scale', {
                property: 'scale',
                from: '0.01 0.01 0.01',
                to: p.escala,
                dur: p.anim_dur || 1100,
                easing: 'easeOutElastic'
            });
            
            // ANIMACIÓN ROTACIÓN
            visor.setAttribute('animation__rotate', {
                property: 'rotation',
                to: `${p.rot_inicial[0]} 360 ${p.rot_inicial[2]}`,
                dur: p.velocidad || 12000,
                loop: true,
                easing: 'linear'
            });
            
            info.textContent = p.nombre;
            info.classList.remove('en-preparacion');
        });

        // Manejo de errores de modelo
        visor.addEventListener('model-error', function() {
            console.log('❌ Modelo no disponible');
            info.textContent = 'En preparación...';
            info.classList.add('en-preparacion');
        });

        async function cambiarPlato(dir) {
            if (!catalogo.length) return;
            
            platoActual = (platoActual + dir + catalogo.length) % catalogo.length;
            const p = catalogo[platoActual];
            
            console.log(`🔄 Cambiando a: ${p.nombre}`);
            
            // 1. RESET COMPLETO
            resetModelo();
            
            // 2. Verificar y cargar
            const existe = await verificarModelo(p.archivo);
            if (existe) {
                info.textContent = `${p.nombre} (cargando...)`;
                visor.setAttribute('gltf-model', p.archivo);
                contenedor.setAttribute('position', p.pos);
            } else {
                info.textContent = 'En preparación...';
                info.classList.add('en-preparacion');
            }
            
            info.classList.add('show');
        }

        function iniciar() {
            // Cargar menú
            fetch('./menu.json')
                .then(res => res.json())
                .then(data => {
                    catalogo = data.platos;
                    
                    // Configurar botones
                    document.getElementById('btn-prev').onclick = () => cambiarPlato(-1);
                    document.getElementById('btn-next').onclick = () => cambiarPlato(1);
                    
                    // Cargar primer plato
                    cambiarPlato(0);
                    
                    // Ocultar loading
                    setTimeout(() => {
                        document.getElementById("loading-screen").style.opacity = "0";
                        setTimeout(() => {
                            document.getElementById("loading-screen").style.display = "none";
                            document.getElementById("ui-overlay").classList.add("show");
                        }, 800);
                    }, 500);
                })
                .catch(e => {
                    console.error('Error menú:', e);
                    info.textContent = 'En preparación...';
                    info.classList.add('show', 'en-preparacion');
                });
        }

        // 🎯 INICIO SIMPLE Y DIRECTO
        document.addEventListener('DOMContentLoaded', iniciar);
    </script>
</body>
</html>
