<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Pro</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background-color: #000000; }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 3000;
            transition: opacity 0.8s ease;
        }

        .logo-gusto {
            width: 250px; height: auto; margin-bottom: 35px;
            /* Respaldo visual si la imagen tarda */
            min-height: 100px; 
        }

        .mensaje-carga {
            color: #ffffff; font-family: 'Segoe UI', sans-serif; 
            margin-bottom: 25px; letter-spacing: 2px; font-size: 14px;
            text-transform: uppercase; text-align: center;
        }

        .loader-bar { width: 200px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        .loader-progress { width: 100%; height: 100%; background: #00d4ff; animation: loading 2s infinite ease-in-out; }

        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        #ui-overlay { 
            position: fixed; bottom: 50px; left: 0; width: 100%; 
            display: flex; justify-content: center; gap: 40px; z-index: 1000; 
            display: none;
        }
        
        .btn-gusto { 
            padding: 20px 45px; background: #25D366; color: white; 
            border: 2px solid white; border-radius: 50px; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; font-size: 20px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.6);
        }
    </style>
</head>

<body>
    <div id="loading-screen">
        <img src="https://raw.githubusercontent.com/Gusto3d-menu/gusto3d-menu/main/logo-blanco.jpg" 
             id="main-logo" class="logo-gusto" alt="Logo Gustó3D">
        
        <div class="mensaje-carga">PREPARANDO EXPERIENCIA GUSTÓ3D</div>
        
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">←</button>
        <button class="btn-gusto" id="btn-next">→</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; filterMinCF: 0.00001; filterBeta: 0.1;" 
        vr-mode-ui="enabled: false" 
        renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; precision: mediump;">
      
        <a-light type="ambient" intensity="1.5"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1.5"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model id="visor" rotation="90 0 0"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const loader = document.querySelector("#loading-screen");
        const ui = document.querySelector("#ui-overlay");
        const visor = document.querySelector("#visor");
        const logo = document.getElementById('main-logo');

        // CATÁLOGO DE ASSETS
        const URL_ASSETS = "https://raw.githubusercontent.com/Gusto3d-menu/gusto3d-assets/main/";
        const catalogo = [
            { nombre: "Sándwich Gourmet", archivo: "food.glb", pos: "0 -0.8 0.1", esc: "1.2 1.2 1.2", rot: "90 0 0" },
            { nombre: "Postre Especial", archivo: "postre.glb", pos: "0 -0.4 0.4", esc: "1.7 1.7 1.7", rot: "90 45 0" }
        ];

        let index = 0;

        function actualizarPlato() {
            const item = catalogo[index];
            visor.setAttribute("src", URL_ASSETS + item.archivo);
            visor.setAttribute("position", item.pos);
            visor.setAttribute("scale", item.esc);
            visor.setAttribute("rotation", item.rot);
        }

        // EVENTOS DE BOTONES
        document.querySelector("#btn-next").addEventListener('click', () => {
            index = (index + 1) % catalogo.length;
            actualizarPlato();
        });

        document.querySelector("#btn-prev").addEventListener('click', () => {
            index = (index - 1 + catalogo.length) % catalogo.length;
            actualizarPlato();
        });

        // MANEJO DE CARGA
        document.querySelector('a-scene').addEventListener('arReady', () => {
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => {
                    loader.style.display = "none";
                    ui.style.display = "flex";
                }, 800);
            }, 3000); 
        });

        // Iniciar primer plato
        actualizarPlato();
    </script>
</body>
</html>
