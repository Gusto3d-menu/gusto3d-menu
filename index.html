<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gusto3D - Menu Interactivo</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap');

        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; position: fixed; background: #000;
            font-family: 'Poppins', sans-serif;
        }

        /* ── PANTALLA DE CARGA ── */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #000 0%, #1a1a2e 50%, #16213e 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 3000; transition: opacity 1.2s ease-out;
        }
        .logo-gusto {
            width: 220px; height: auto; margin-bottom: 30px;
            filter: drop-shadow(0 0 20px rgba(37,211,102,0.5));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0px);} 50%{transform:translateY(-10px);} }
        .mensaje-carga {
            color: #25D366; letter-spacing: 3px; font-size: 13px;
            text-transform: uppercase; margin-bottom: 20px; animation: pulse-text 1.5s infinite;
        }
        @keyframes pulse-text { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        .barra-progreso { width: 200px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
        .progreso-fill {
            height: 100%; background: linear-gradient(90deg,#25D366,#128C7E);
            width: 0%; animation: progress-fill 4s ease-out forwards;
        }
        @keyframes progress-fill { 0%{width:0%;} 100%{width:100%;} }

        /* ── PANTALLA ERROR ── */
        #error-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #000 0%, #1a1a2e 50%, #16213e 100%);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 3500; text-align: center; padding: 30px;
        }
        .error-icono {
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(255,107,53,0.15); border: 2px solid rgba(255,107,53,0.4);
            display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
        }
        .error-titulo { color: #ff6b35; font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .error-sub { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 28px; }
        .btn-reintentar {
            padding: 14px 32px; background: linear-gradient(45deg,#25D366,#128C7E);
            border: none; border-radius: 50px; color: white;
            font-family: 'Poppins', sans-serif; font-weight: 600;
            font-size: 13px; letter-spacing: 1px; cursor: pointer;
        }

        /* ── PANTALLAS BASE ── */
        .pantalla {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(160deg,#0d1117 0%,#1a1a2e 40%,#0f3460 100%);
            z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.5s ease;
        }
        .pantalla.activa { opacity: 1; visibility: visible; }

        /* ── PANTALLA CATEGORIAS ── */
        #pantalla-categorias h1 {
            font-family: 'Playfair Display', serif;
            color: #25D366; font-size: 28px; margin-bottom: 4px; letter-spacing: 1px;
        }
        #nombre-restaurante {
            color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 4px;
            font-weight: 300; letter-spacing: 1px;
        }
        #pantalla-categorias > p {
            color: rgba(255,255,255,0.4); font-size: 12px; margin-bottom: 35px;
            letter-spacing: 2px; text-transform: uppercase;
        }
        .grid-categorias {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 14px; width: 88%; max-width: 360px;
        }
        .btn-categoria {
            position: relative; padding: 28px 10px 22px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(37,211,102,0.25);
            border-radius: 20px; color: white; cursor: pointer;
            text-transform: uppercase; font-family: 'Poppins', sans-serif;
            font-weight: 600; font-size: 12px; letter-spacing: 1.5px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            transition: all 0.3s ease; overflow: hidden;
        }
        .btn-categoria::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg,rgba(37,211,102,0.15),rgba(18,140,126,0.05));
            opacity: 0; transition: opacity 0.3s;
        }
        .btn-categoria:active::before { opacity: 1; }
        .btn-categoria:active { transform: scale(0.97); border-color: #25D366; }
        .cat-icon {
            width: 52px; height: 52px; border-radius: 14px;
            background: linear-gradient(135deg,#25D366,#128C7E);
            display: flex; align-items: center; justify-content: center;
        }

        /* ── PANTALLA PLATOS + CARRUSEL ── */
        #pantalla-platos { justify-content: flex-start; padding-top: 0; overflow: hidden; }
        .platos-header {
            width: 100%; padding: 55px 24px 18px;
            display: flex; align-items: center; gap: 14px;
            background: linear-gradient(180deg,rgba(13,17,23,0.95) 70%,transparent);
            position: relative; z-index: 10;
        }
        #titulo-categoria {
            font-family: 'Playfair Display', serif;
            color: #25D366; font-size: 24px; margin: 0; flex: 1;
        }
        .cat-badge {
            font-size: 11px; color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.07);
            padding: 4px 10px; border-radius: 20px; letter-spacing: 1px;
        }

        /* ── CARRUSEL ── */
        .carrusel-wrapper {
            flex: 1; width: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            padding-bottom: 80px;
        }
        .carrusel-track-outer { width: 100%; overflow: hidden; position: relative; }
        .carrusel-track {
            display: flex;
            transition: transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94);
            will-change: transform;
        }
        .carrusel-slide {
            min-width: 100%; padding: 0 30px;
            display: flex; justify-content: center; align-items: center;
        }

        /* ── TARJETA PLATO ── */
        .plato-card {
            width: 100%; max-width: 320px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transform: scale(0.97); transition: transform 0.4s ease;
            position: relative;
        }
        .carrusel-slide.activo .plato-card { transform: scale(1); }

        /* ── BADGE DESTACADO ── */
        .badge-destacado {
            position: absolute; top: 12px; left: 12px;
            background: linear-gradient(45deg,#f7971e,#ffd200);
            color: #1a1a2e; font-size: 10px; font-weight: 700;
            padding: 4px 10px; border-radius: 20px; letter-spacing: 1px;
            text-transform: uppercase; z-index: 5;
            box-shadow: 0 2px 10px rgba(247,151,30,0.5);
        }

        /* ── BADGE AGOTADO ── */
        .badge-agotado {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 6; border-radius: 28px;
        }
        .badge-agotado span {
            color: #ff6b35; font-size: 16px; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            border: 2px solid rgba(255,107,53,0.6);
            padding: 10px 24px; border-radius: 50px;
        }

        .plato-imagen-wrap {
            width: 100%; height: 220px;
            position: relative; overflow: hidden;
            background: linear-gradient(135deg,#1a2744 0%,#0f3460 100%);
        }
        .plato-imagen-wrap::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(37,211,102,0.1), rgba(18,140,126,0.05));
            opacity: 0; transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .plato-imagen {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s ease;
        }
        .plato-card:active .plato-imagen { transform: scale(1.04); }

        .plato-imagen-placeholder {
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 14px; text-align: center; padding: 20px;
        }
        .icono-plato-svg {
            width: 72px; height: 72px; border-radius: 50%;
            background: linear-gradient(135deg,rgba(37,211,102,0.2),rgba(18,140,126,0.1));
            border: 2px solid rgba(37,211,102,0.35);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s ease;
        }
        .placeholder-text {
            color: rgba(255,255,255,0.3); font-size: 11px;
            letter-spacing: 2px; text-transform: uppercase; margin-top: 8px;
        }
        .plato-badge-num {
            position: absolute; top: 12px; right: 12px;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
            color: #25D366; font-size: 11px; font-weight: 600;
            padding: 4px 10px; border-radius: 20px; letter-spacing: 1px; z-index: 4;
        }
        .plato-shimmer {
            position: absolute; inset: 0;
            background: linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.06) 50%,transparent 60%);
            background-size: 200% 100%; animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }

        /* ── BOTON VER EN 3D ── */
        .btn-ver-ar {
            display: none !important; /* <--- ESTA LÍNEA LO OCULTA */
            width: 100%;
            padding: 10px 0;
            background: linear-gradient(90deg, rgba(37,211,102,0.18), rgba(18,140,126,0.10));
            border: none;
            border-top: 1px solid rgba(37,211,102,0.25);
            color: #25D366;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s ease;
        }
        .btn-ver-ar:active {
            background: linear-gradient(90deg, rgba(37,211,102,0.35), rgba(18,140,126,0.25));
        }
        .btn-ver-ar svg { flex-shrink: 0; }

        .plato-info {
            padding: 18px 22px 0;
            display: flex; flex-direction: column;
        }
        .plato-nombre {
            font-family: 'Playfair Display', serif;
            color: white; font-size: 20px; margin: 0 0 4px; line-height: 1.25;
        }

        /* ── PRECIOS CON TACHADO ── */
        .precios-wrap { display: flex; align-items: baseline; gap: 10px; margin: 4px 0 10px; }
        .plato-precio {
            font-family: 'Playfair Display', serif;
            color: #25D366; font-size: 24px; font-weight: 700;
            text-shadow: 0 2px 8px rgba(37,211,102,0.3);
        }
        .plato-precio-anterior {
            font-size: 14px; color: rgba(255,255,255,0.3);
            text-decoration: line-through; font-weight: 400;
        }

        .plato-descripcion {
            color: rgba(255,255,255,0.75);
            font-size: 12px; line-height: 1.45;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            margin-bottom: 12px;
        }

        /* ── ALERGENOS ── */
        .alergenos-wrap {
            display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px;
        }
        .alergen-chip {
            font-size: 9px; font-weight: 600; letter-spacing: 1px;
            padding: 3px 8px; border-radius: 20px; text-transform: uppercase;
            background: rgba(255,107,53,0.12); color: rgba(255,107,53,0.9);
            border: 1px solid rgba(255,107,53,0.25);
        }

        /* ── HINT AR FIJO ── */
        .ar-hint-fijo {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            color: rgba(37,211,102,0.8);
            font-size: 11px; letter-spacing: 1px;
            text-transform: uppercase; font-weight: 500; text-align: center;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            padding: 8px 20px; border-radius: 25px;
            border: 1px solid rgba(37,211,102,0.3);
            animation: pulse-hint 2s infinite;
            z-index: 15; white-space: nowrap;
        }
        @keyframes pulse-hint {
            0%,100%{ opacity:1; transform: translateX(-50%) translateY(0px); }
            50%{ opacity:0.7; transform: translateX(-50%) translateY(-2px); }
        }

        /* ── NAVEGACION CARRUSEL ── */
        .carrusel-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 38px; height: 38px; border-radius: 50%;
            background: rgba(255,255,255,0.08); backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.15);
            color: white; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; z-index: 10;
        }
        .carrusel-nav:active { background: rgba(37,211,102,0.3); border-color: #25D366; }
        .carrusel-nav.izq { left: 8px; }
        .carrusel-nav.der { right: 8px; }

        /* ── DOTS ── */
        .carrusel-dots { display: flex; gap: 6px; margin-top: 16px; align-items: center; }
        .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: rgba(255,255,255,0.2); transition: all 0.35s ease; cursor: pointer;
        }
        .dot.activo { background: #25D366; width: 22px; border-radius: 4px; }

        /* ── CONTADOR ── */
        .carrusel-contador {
            position: absolute; bottom: 4px; right: 30px;
            color: rgba(255,255,255,0.25); font-size: 11px; letter-spacing: 1px;
        }

        /* ── BOTON VOLVER ── */
        #btn-volver {
            position: fixed; top: 18px; left: 18px;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(37,211,102,0.15); color: #25D366;
            border: 1.5px solid rgba(37,211,102,0.5); z-index: 2500;
            display: none; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer;
            backdrop-filter: blur(8px); transition: all 0.2s;
        }
        #btn-volver:active { background: #25D366; color: white; }

        /* ── UI AR ── */
        #plato-info-ar {
            position: fixed; top: 50px; width: 100%; text-align: center;
            color: white; font-family: 'Poppins', sans-serif;
            font-size: 20px; font-weight: 600; text-shadow: 0 2px 10px #000;
            z-index: 1001; display: none; letter-spacing: 0.5px;
        }
        #ui-ar {
            position: fixed; bottom: 40px; width: 100%;
            display: none; justify-content: center; gap: 12px; z-index: 1001;
        }
        .btn-ar {
            padding: 14px 22px; background: linear-gradient(45deg,#25D366,#128C7E);
            color: white; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px; font-family: 'Poppins', sans-serif;
            font-weight: 600; font-size: 12px; letter-spacing: 1px; cursor: pointer;
        }
        .en-preparacion { color: #ff6b35 !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }

        /* ── ANIMACION ENTRADA SLIDE ── */
        @keyframes slideEntrada {
            from { opacity: 0; transform: translateY(18px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .carrusel-slide.activo .plato-card {
            animation: slideEntrada 0.38s ease forwards;
        }
    </style>
</head>
<body>

    <!-- ── CARGA ── -->
    <div id="loading-screen">
        <img src="logo-gusto3d.jpg" class="logo-gusto" alt="Logo Gusto3D">
        <div class="mensaje-carga">INICIALIZANDO GUSTO3D</div>
        <div class="barra-progreso"><div class="progreso-fill"></div></div>
    </div>

    <!-- ── ERROR ── -->
    <div id="error-screen">
        <div class="error-icono">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
                 stroke="#ff6b35" stroke-width="2" stroke-linecap="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </div>
        <div class="error-titulo">Error al cargar el menu</div>
        <div class="error-sub">Verifica tu conexion a internet<br>o que el archivo menu.json exista</div>
        <button class="btn-reintentar" onclick="window.location.reload()">Reintentar</button>
    </div>

    <!-- ── CATEGORIAS ── -->
    <div id="pantalla-categorias" class="pantalla">
        <h1>MENU DIGITAL 3D</h1>
        <div id="nombre-restaurante"></div>
        <p>Selecciona una categoria</p>
        <div class="grid-categorias" id="grid-categorias">
            <!-- Se genera dinamicamente desde menu.json -->
        </div>
    </div>

    <!-- ── PLATOS CON CARRUSEL ── -->
    <div id="pantalla-platos" class="pantalla">
        <div class="platos-header">
            <h2 id="titulo-categoria"></h2>
            <span class="cat-badge" id="badge-cantidad"></span>
        </div>
        <div class="carrusel-wrapper">
            <div class="carrusel-track-outer" id="carrusel-outer">
                <div class="carrusel-track" id="carrusel-track"></div>
            </div>
            <button class="carrusel-nav izq" id="btn-prev">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
            <button class="carrusel-nav der" id="btn-next">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </button>
            <div class="carrusel-dots" id="carrusel-dots"></div>
            <div class="carrusel-contador" id="carrusel-contador"></div>
            <div class="ar-hint-fijo">Toca la imagen o "Ver en 3D" para AR</div>
        </div>
    </div>

    <!-- ── BOTON VOLVER ── -->
    <button id="btn-volver">&#8592;</button>

    <!-- ── UI AR ── -->
    <div id="plato-info-ar"></div>
    <div id="ui-ar">
        <button class="btn-ar" id="ar-back-list">VER LISTA</button>
        <button class="btn-ar" id="ar-back-menu">CATEGORIAS</button>
    </div>

    <!-- ── ESCENA AR ── -->
    <a-scene
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;
                      uiLoading: no; uiScanning: no;
                      filterMinCF: 0.001; filterBeta: 0.01;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        id="ar-scene">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="contenedor-estabilizador" scale="0.01 0.01 0.01">
                <a-gltf-model id="visor"></a-gltf-model>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
    /* ══════════════════════════════════════════
       REFERENCIAS DOM
    ══════════════════════════════════════════ */
    const visor      = document.getElementById("visor");
    const contenedor = document.getElementById("contenedor-estabilizador");
    const info       = document.getElementById("plato-info-ar");
    const arScene    = document.getElementById("ar-scene");
    const uiAr       = document.getElementById("ui-ar");
    const track      = document.getElementById("carrusel-track");
    const dotsWrap   = document.getElementById("carrusel-dots");
    const contador   = document.getElementById("carrusel-contador");
    const btnPrev    = document.getElementById("btn-prev");
    const btnNext    = document.getElementById("btn-next");

    /* ══════════════════════════════════════════
       ESTADO GLOBAL
    ══════════════════════════════════════════ */
    let catalogo       = [];
    let categorias     = [];
    let catActual      = -1;
    let indiceActual   = 0;
    let platosActuales = [];
    let touchStartX    = 0;
    let touchStartY    = 0;
    let arrastrando    = false;

    /* ══════════════════════════════════════════
       ICONOS SVG POR CATEGORIA (por icono slug)
    ══════════════════════════════════════════ */
    const ICONOS_CAT = {
        entradas: '<path d="M2 20h20M12 4v4M8 8h8M6 12h12M4 16h16"/>',
        fuerte:   '<path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>',
        postres:  '<circle cx="12" cy="9" r="5"/><path d="M12 14v8M8 22h8"/>',
        bebidas:  '<path d="M8 2h8l1 10H7L8 2z"/><path d="M7 12c0 5 2 8 5 8s5-3 5-8"/>',
        default:  '<circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>'
    };

    function svgIconCategoria(iconoSlug) {
        const paths = ICONOS_CAT[iconoSlug] || ICONOS_CAT.default;
        return `<svg width="34" height="34" viewBox="0 0 24 24" fill="none"
                     stroke="rgba(37,211,102,0.8)" stroke-width="1.5"
                     stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
    }

    function svgIconBotonCat(iconoSlug) {
        const paths = ICONOS_CAT[iconoSlug] || ICONOS_CAT.default;
        return `<svg width="26" height="26" viewBox="0 0 24 24" fill="none"
                     stroke="white" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
    }

    /* ══════════════════════════════════════════
       GENERAR GRID DE CATEGORIAS DINAMICAMENTE
    ══════════════════════════════════════════ */
    function generarGridCategorias() {
        const grid = document.getElementById('grid-categorias');
        grid.innerHTML = '';
        categorias.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'btn-categoria';
            btn.dataset.cat = cat.id;
            btn.innerHTML = `
                <div class="cat-icon">${svgIconBotonCat(cat.icono)}</div>
                ${cat.nombre.toUpperCase()}`;
            btn.addEventListener('click', () => {
                document.getElementById('pantalla-categorias').classList.remove('activa');
                abrirCategoria(cat.id);
            });
            grid.appendChild(btn);
        });
    }

    /* ══════════════════════════════════════════
       CREAR SLIDE DE PLATO
    ══════════════════════════════════════════ */
    function crearSlide(plato, idxGlobal, posicion, totalPlatos) {
        const slide = document.createElement('div');
        slide.className = 'carrusel-slide' + (posicion === 0 ? ' activo' : '');

        const tieneImagen = plato.imagen && plato.imagen.trim() !== '';
        const descripcion = plato.descripcion || "Delicioso plato preparado con ingredientes frescos.";
        const catIcono    = categorias.find(c => c.id === catActual)?.icono || 'default';

        /* ── imagen ── */
        const imgHTML = tieneImagen
            ? `<img class="plato-imagen" loading="lazy" decoding="async"
                     src="${plato.imagen}" alt="${plato.nombre}"
                     onerror="this.parentNode.querySelector('.plato-imagen-placeholder').style.display='flex';
                              this.style.display='none';">`
            : '';

        /* ── precio con tachado ── */
        const precioHTML = plato.precio_anterior
            ? `<span class="plato-precio">$${plato.precio || 'Consultar'}</span>
               <span class="plato-precio-anterior">$${plato.precio_anterior}</span>`
            : `<span class="plato-precio">$${plato.precio || 'Consultar'}</span>`;

        /* ── alergenos ── */
        let alergenosHTML = '';
        if (plato.alergenos && plato.alergenos.length > 0) {
            const chips = plato.alergenos
                .map(a => `<span class="alergen-chip">${a}</span>`)
                .join('');
            alergenosHTML = `<div class="alergenos-wrap">${chips}</div>`;
        }

        /* ── badge destacado ── */
        const badgeDestacado = plato.destacado
            ? `<div class="badge-destacado">Recomendado</div>` : '';

        /* ── badge agotado ── */
        const badgeAgotado = (plato.disponible === false)
            ? `<div class="badge-agotado"><span>Agotado</span></div>` : '';

        const disponibleAttr = (plato.disponible === false) ? 'data-agotado="true"' : '';

        slide.innerHTML = `
            <div class="plato-card" data-plato-idx="${idxGlobal}" ${disponibleAttr}>
                ${badgeAgotado}
                ${badgeDestacado}
                <div class="plato-imagen-wrap" data-plato-idx="${idxGlobal}">
                    ${imgHTML}
                    <div class="plato-imagen-placeholder"
                         style="display:${tieneImagen ? 'none' : 'flex'};"
                         data-plato-idx="${idxGlobal}">
                        <div class="icono-plato-svg">${svgIconCategoria(catIcono)}</div>
                        <span class="placeholder-text">Toca para AR</span>
                    </div>
                    <div class="plato-shimmer"></div>
                    <div class="plato-badge-num">${posicion + 1} / ${totalPlatos}</div>
                </div>
                <div class="plato-info">
                    <h3 class="plato-nombre">${plato.nombre}</h3>
                    <div class="precios-wrap">${precioHTML}</div>
                    <p class="plato-descripcion">${descripcion}</p>
                    ${alergenosHTML}
                </div>
                <button class="btn-ver-ar" data-plato-idx="${idxGlobal}"
                        ${plato.disponible === false ? 'disabled style="opacity:0.35;cursor:not-allowed;"' : ''}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <path d="M1 6l5-3 6 3 5-3 6 3v12l-6 3-5-3-6 3-5-3V6z"/>
                        <line x1="7" y1="3" x2="7" y2="15"/>
                        <line x1="12" y1="6" x2="12" y2="18"/>
                        <line x1="17" y1="3" x2="17" y2="15"/>
                    </svg>
                    VER EN 3D
                </button>
            </div>`;

        /* ── eventos ── */
        if (plato.disponible !== false) {
            const imagenWrap = slide.querySelector('.plato-imagen-wrap');
            imagenWrap.style.cursor = 'pointer';
            imagenWrap.addEventListener('click', e => {
                e.stopPropagation();
                mostrarPlatoAR(idxGlobal);
            });

            const placeholder = slide.querySelector('.plato-imagen-placeholder');
            placeholder.addEventListener('click', e => {
                e.stopPropagation();
                mostrarPlatoAR(idxGlobal);
            });

            const btnAR = slide.querySelector('.btn-ver-ar');
            btnAR.addEventListener('click', e => {
                e.stopPropagation();
                mostrarPlatoAR(idxGlobal);
            });
        }

        return slide;
    }

    /* ══════════════════════════════════════════
       ACTUALIZAR CARRUSEL
    ══════════════════════════════════════════ */
    function actualizarCarrusel() {
        const total = platosActuales.length;

        track.style.transform = `translateX(-${indiceActual * 100}%)`;

        document.querySelectorAll('.carrusel-slide').forEach((s, i) => {
            const era = s.classList.contains('activo');
            s.classList.toggle('activo', i === indiceActual);
            /* Forzar re-animacion al activar */
            if (!era && i === indiceActual) {
                const card = s.querySelector('.plato-card');
                if (card) { card.style.animation = 'none'; void card.offsetWidth; card.style.animation = ''; }
            }
        });

        document.querySelectorAll('.dot').forEach((d, i) => {
            d.classList.toggle('activo', i === indiceActual);
        });

        contador.textContent = `${indiceActual + 1} / ${total}`;
    }

    /* Loop circular: nunca se bloquea en extremos */
    function irA(idx) {
        const total = platosActuales.length;
        indiceActual = (idx + total) % total;
        actualizarCarrusel();
    }

    /* ══════════════════════════════════════════
       ABRIR CATEGORIA
    ══════════════════════════════════════════ */
    /* ══════════════════════════════════════════
   LOGICA DE CARRUSEL INFINITO (REEMPLAZO)
══════════════════════════════════════════ */

function abrirCategoria(catId) {
    catActual = catId;
    platosActuales = catalogo.filter(p => p.categoria === catId);
    const total = platosActuales.length;
    
    // Empezamos en 1 porque el 0 es el clon del último
    indiceActual = 1; 

    track.innerHTML = '';
    dotsWrap.innerHTML = '';

    if (total === 0) return;

    // 1. Clon del ÚLTIMO al principio
    const ultimoPlato = platosActuales[total - 1];
    track.appendChild(crearSlide(ultimoPlato, catalogo.indexOf(ultimoPlato), total - 1, total));

    // 2. Platos REALES
    platosActuales.forEach((plato, pos) => {
        track.appendChild(crearSlide(plato, catalogo.indexOf(plato), pos, total));
        
        const dot = document.createElement('div');
        dot.className = 'dot' + (pos === 0 ? ' activo' : '');
        dot.addEventListener('click', () => irA(pos + 1));
        dotsWrap.appendChild(dot);
    });

    // 3. Clon del PRIMERO al final
    const primerPlato = platosActuales[0];
    track.appendChild(crearSlide(primerPlato, catalogo.indexOf(primerPlato), 0, total));

    // Posicionamiento inicial sin animación
    track.style.transition = 'none';
    actualizarCarrusel();
    
    setTimeout(() => {
        track.style.transition = 'transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94)';
        document.getElementById('pantalla-platos').classList.add('activa');
    }, 50);

    const catNombre = categorias.find(c => c.id === catId)?.nombre || 'Menu';
    document.getElementById('titulo-categoria').textContent = catNombre;
    document.getElementById('badge-cantidad').textContent = `${total} plato${total !== 1 ? 's' : ''}`;
    document.getElementById('btn-volver').style.display = 'flex';
}

function actualizarCarrusel() {
    const totalReal = platosActuales.length;
    track.style.transform = `translateX(-${indiceActual * 100}%)`;

    // Calculamos qué punto (dot) debe brillar
    let indiceVisual = indiceActual - 1;
    if (indiceActual === 0) indiceVisual = totalReal - 1;
    if (indiceActual === totalReal + 1) indiceVisual = 0;

    document.querySelectorAll('.carrusel-slide').forEach((s, i) => {
        s.classList.toggle('activa', i === indiceActual);
    });

    document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('activo', i === indiceVisual);
    });

    contador.textContent = `${indiceVisual + 1} / ${totalReal}`;
}

function irA(idx) {
    const totalReal = platosActuales.length;
    indiceActual = idx;
    
    track.style.transition = 'transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94)';
    actualizarCarrusel();

    // El "salto mágico" ocurre cuando termina la transición
    track.addEventListener('transitionend', function deVuelta() {
        if (indiceActual === totalReal + 1) {
            track.style.transition = 'none';
            indiceActual = 1;
            actualizarCarrusel();
        }
        if (indiceActual === 0) {
            track.style.transition = 'none';
            indiceActual = totalReal;
            actualizarCarrusel();
        }
        track.removeEventListener('transitionend', deVuelta);
    });
}

// Asegúrate de que los botones llamen a la nueva función irA
btnNext.onclick = () => irA(indiceActual + 1);
btnPrev.onclick = () => irA(indiceActual - 1);

    window.onload = init;
    </script>
</body>
</html>
