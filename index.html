<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Pro</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; position: fixed; background: #000; 
        }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 3000;
            transition: opacity 0.8s ease;
        }

        .logo-gusto {
            width: 250px; height: auto; margin-bottom: 35px;
            filter: drop-shadow(0 4px 8px rgba(255,255,255,0.3));
        }

        .mensaje-carga {
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin-bottom: 25px; letter-spacing: 2px; font-size: 14px;
            text-transform: uppercase; text-align: center;
        }

        .loader-bar { 
            width: 200px; height: 4px; background: rgba(255,255,255,0.2); 
            border-radius: 10px; overflow: hidden; 
        }
        .loader-progress { 
            width: 100%; height: 100%; background: linear-gradient(90deg, #00d4ff, #25D366);
            animation: loading 2.5s infinite ease-in-out; 
        }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        #ui-overlay { 
            position: fixed; bottom: 40px; left: 0; width: 100%; 
            display: flex; justify-content: center; gap: 30px; z-index: 1000;
            opacity: 0; transition: opacity 0.5s ease;
        }
        #ui-overlay.show { opacity: 1; display: flex !important; }
        
        .btn-gusto { 
            padding: 18px 35px; background: linear-gradient(45deg, #25D366, #128C7E);
            color: white; border: 2px solid rgba(255,255,255,0.8); 
            border-radius: 50px; font-weight: bold; font-size: 18px;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 8px 25px rgba(37,211,102,0.4);
            transition: all 0.3s ease; user-select: none;
        }
        .btn-gusto:active { transform: scale(0.95); box-shadow: 0 4px 15px rgba(37,211,102,0.6); }
    </style>
</head>

<body>
    <!-- 🖥️ PANTALLA CARGA -->
    <div id="loading-screen">
        <img src="logo-banco.jpg" class="logo-gusto" alt="Logo Gustó3D" id="main-logo">
        <div class="mensaje-carga">PREPARANDO EXPERIENCIA GUSTÓ3D</div>
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <!-- 🎮 BOTONES NAVEGACIÓN -->
    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">← Anterior</button>
        <button class="btn-gusto" id="btn-next">Siguiente →</button>
    </div>

    <!-- 🎬 ESCENA AR -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; filterMinCF: 0.00001; filterBeta: 0.1;" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true;">
      
        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1.5"></a-light>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model id="visor" rotation="90 0 0" position="0 1 0.1" scale="1.2 1.2 1.2" loading="lazy"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        // 🎯 ELEMENTOS DOM
        const loader = document.getElementById("loading-screen");
        const ui = document.getElementById("ui-overlay");
        const visor = document.getElementById("visor");
        const logo = document.getElementById("main-logo");

        // 📋 CATÁLOGO PLATOS
        const URL_BASE = "https://raw.githubusercontent.com/Gusto3d-menu/gusto3d-assets/main/";
        const catalogo = [
            { nombre: "Sándwich Gourmet", archivo: "food.glb", pos: "0 0 0", escala: "1 1 8", rot: "90 45 0" },
            { nombre: "Postre Especial", archivo: "postre.glb", pos: "0 -0.4 0.4", escala: "1.5 1.5 1.5", rot: "90 45 0" }
        ];
        let platoActual = 0;

        // 🔄 Cambiar plato
        function cambiarPlato(direccion) {
            platoActual = (platoActual + direccion + catalogo.length) % catalogo.length;
            const plato = catalogo[platoActual];
            
            visor.setAttribute("src", URL_BASE + plato.archivo);
            visor.setAttribute("position", plato.pos);
            visor.setAttribute("scale", plato.escala);
            visor.setAttribute("rotation", plato.rot);
        }

        // 🎮 EVENTOS BOTONES (SIEMPRE activos)
        document.getElementById("btn-prev").onclick = () => cambiarPlato(-1);
        document.getElementById("btn-next").onclick = () => cambiarPlato(1);

        // ⏳ SECUENCIA CARGA FIJA (independiente de arReady)
        setTimeout(() => {
            loader.style.opacity = "0";
            setTimeout(() => {
                loader.style.display = "none";
                ui.classList.add("show"); // ✅ Activa UI
            }, 800);
        }, 4000); // 4 segundos fijos

        // 🔗 Carga primer plato inmediatamente
        cambiarPlato(0);

        // 📡 Listener AR (opcional)
        document.querySelector('a-scene').addEventListener('arReady', () => {
            console.log("✅ AR listo");
        });

        // 🖼️ Fallback logo si falla
        logo.onerror = () => {
            logo.src = "logo-banco.jpg"; // Fallback
            logo.style.filter = "brightness(1.2)";
        };
    </script>
</body>
</html>
