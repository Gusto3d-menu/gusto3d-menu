<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gustó3D - Optimizado</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #info-plato {
            position: fixed; top: 0; width: 100%; text-align: center;
            color: white; background: rgba(0,0,0,0.8); padding: 15px 0;
            z-index: 9999; font-family: sans-serif;
        }
        #ui-overlay {
            position: fixed; bottom: 30px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 20px; z-index: 9999;
        }
        .btn-gusto {
            padding: 15px 25px; background: #25D366; color: white;
            border: 2px solid white; border-radius: 12px; font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="info-plato">DESCARGANDO PLATOS (8MB)...</div>

    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">Anterior</button>
        <button class="btn-gusto" id="btn-next">Siguiente</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no;" 
        embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false">
        
        <a-assets timeout="30000">
            <a-asset-item id="mod-sandwich" src="https://raw.githubusercontent.com/Gusto3d-menu/gusto3d-assets/main/food.glb"></a-asset-item>
            <a-asset-item id="mod-postre" src="https://raw.githubusercontent.com/Gusto3d-menu/gusto3d-assets/main/postre.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model id="visor" src="#mod-sandwich" position="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const visor = document.querySelector("#visor");
        const texto = document.querySelector("#info-plato");

        const catalogo = [
            { nombre: "Sándwich", modelo: "#mod-sandwich", escala: "0.5 0.5 0.5" },
            { nombre: "Postre", modelo: "#mod-postre", escala: "0.8 0.8 0.8" }
        ];

        let index = 0;

        function actualizarPlato() {
            const item = catalogo[index];
            visor.setAttribute("src", item.modelo);
            visor.setAttribute("scale", item.escala);
            texto.innerText = "MENÚ: " + item.nombre;
        }

        // Cuando la escena está lista
        document.querySelector('a-scene').addEventListener('loaded', () => {
            texto.innerText = "¡Listo! Apunta al logo";
        });

        document.querySelector("#btn-next").addEventListener('click', () => {
            index = (index + 1) % catalogo.length;
            actualizarPlato();
        });

        document.querySelector("#btn-prev").addEventListener('click', () => {
            index = (index - 1 + catalogo.length) % catalogo.length;
            actualizarPlato();
        });
    </script>
</body>
</html>
