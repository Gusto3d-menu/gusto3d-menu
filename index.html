<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Pro</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; position: fixed; background: #000;
        }
        
        /* Pantalla de Carga */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 3000;
            transition: opacity 0.8s ease;
        }

        .logo-gusto {
            width: 250px; height: auto; margin-bottom: 35px;
            filter: drop-shadow(0 4px 8px rgba(255,255,255,0.3));
        }

        .mensaje-carga {
            color: #fff; font-family: 'Segoe UI', sans-serif;
            margin-bottom: 25px; letter-spacing: 2px; font-size: 14px;
            text-transform: uppercase; text-align: center;
        }

        .loader-bar {
            width: 200px; height: 4px; background: rgba(255,255,255,0.2);
            border-radius: 10px; overflow: hidden;
        }
        .loader-progress {
            width: 100%; height: 100%; background: linear-gradient(90deg, #00d4ff, #25D366);
            animation: loading 2.5s infinite ease-in-out;
        }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* Información del Plato */
        #plato-info {
            position: fixed; top: 40px; width: 100%; text-align: center;
            color: white; font-family: 'Segoe UI', sans-serif; 
            font-size: 22px; font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            z-index: 1000; opacity: 0; transition: all 0.5s;
        }
        #plato-info.show { opacity: 1; transform: translateY(10px); }

        /* Controles Inferiores */
        #ui-overlay {
            position: fixed; bottom: 40px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 30px; z-index: 1000;
            opacity: 0; transition: opacity 0.5s ease;
        }
        #ui-overlay.show { opacity: 1; display: flex !important; }
        
        .btn-gusto {
            padding: 18px 30px; background: linear-gradient(45deg, #25D366, #128C7E);
            color: white; border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50px; font-weight: bold; font-size: 16px;
            cursor: pointer; text-transform: uppercase; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: all 0.3s ease; user-select: none;
        }
        .btn-gusto:active { transform: scale(0.9); }

        /* Animación para el texto */
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>
    <div id="loading-screen">
        <img src="logo-banco.jpg" class="logo-gusto" alt="Logo Gustó3D" id="main-logo">
        <div class="mensaje-carga" id="mensaje-carga">INICIANDO EXPERIENCIA...</div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>

    <div id="plato-info">Cargando Plato...</div>

    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">← Anterior</button>
        <button class="btn-gusto" id="btn-next">Siguiente →</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; filterMinCF: 0.00001; filterBeta: 0.1;"
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true;">
      
        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1.5"></a-light>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model id="visor" shadow="receive: true"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const loader = document.getElementById("loading-screen");
        const ui = document.getElementById("ui-overlay");
        const visor = document.getElementById("visor");
        const mensajeCarga = document.getElementById("mensaje-carga");
        const platoInfo = document.getElementById("plato-info");
        
        let catalogo = [];
        let platoActual = 0;
        let modelosPrecargados = new Map();

        // 1. CARGA DEL MENÚ DESDE JSON
        async function cargarMenu() {
            try {
                mensajeCarga.textContent = "CONECTANDO CON LA CARTA...";
                const response = await fetch('./menu.json');
                const datos = await response.json();
                catalogo = datos.platos;
                
                mensajeCarga.textContent = "PREPARANDO PLATOS 3D...";
                for (const plato of catalogo) {
                    await precargarModelo(plato.archivo);
                }
                
                mensajeCarga.textContent = "¡BUEN PROVECHO!";
                iniciarApp();
            } catch (error) {
                console.error("Error:", error);
                mensajeCarga.textContent = "REVISANDO CONEXIÓN...";
                setTimeout(iniciarApp, 2000); 
            }
        }

        // 2. PRE-CARGA DE ASSETS
        async function precargarModelo(url) {
            return new Promise((resolve) => {
                if (modelosPrecargados.has(url)) return resolve();
                const link = document.createElement('link');
                link.rel = 'preload';
                link.href = url;
                link.as = 'fetch';
                document.head.appendChild(link);
                modelosPrecargados.set(url, true);
                resolve();
            });
        }

        // 3. CAMBIO DE PLATO CON EFECTO REBOTE
        function cambiarPlato(direccion) {
            if (catalogo.length === 0) return;

            platoActual = (platoActual + direccion + catalogo.length) % catalogo.length;
            const plato = catalogo[platoActual];

            // Efecto de salida (achicar)
            visor.setAttribute("scale", "0.01 0.01 0.01");

            setTimeout(() => {
                visor.setAttribute("src", plato.archivo);
                visor.setAttribute("position", plato.pos);
                visor.setAttribute("rotation", plato.rot);

                // ANIMACIÓN ELÁSTICA
                visor.setAttribute("animation", {
                    property: "scale",
                    to: plato.escala,
                    dur: 1000,
                    easing: "easeOutElastic"
                });

                // Actualizar Texto
                platoInfo.textContent = plato.nombre;
                platoInfo.classList.remove("show");
                setTimeout(() => platoInfo.classList.add("show"), 100);
            }, 250);
        }

        function iniciarApp() {
            document.getElementById("btn-prev").onclick = () => cambiarPlato(-1);
            document.getElementById("btn-next").onclick = () => cambiarPlato(1);

            if (catalogo.length > 0) cambiarPlato(0);

            // Quitar pantalla de carga
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => {
                    loader.style.display = "none";
                    ui.classList.add("show");
                }, 800);
            }, 1200);
        }

        document.addEventListener('DOMContentLoaded', cargarMenu);
        
        document.querySelector('a-scene').addEventListener('arReady', () => {
            console.log("Gustó3D listo en oficina");
        });
    </script>
</body>
</html>
