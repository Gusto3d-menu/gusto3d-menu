<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gustó3D - Menú AR Profesional</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        
        /* Banner superior con el nombre del plato */
        #info-plato {
            position: fixed; top: 0; width: 100%; text-align: center;
            color: white; background: rgba(0,0,0,0.8); padding: 20px 0;
            z-index: 9999; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            font-weight: bold; font-size: 1.2rem; letter-spacing: 1px;
        }
        
        /* Contenedor de botones */
        #ui-overlay {
            position: fixed; bottom: 40px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 30px; z-index: 9999;
        }
        
        /* Estilo de los botones */
        .btn-gusto {
            padding: 15px 30px; background: #25D366; color: white;
            border: 2px solid white; border-radius: 50px; font-weight: bold;
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.2s ease;
        }
        
        .btn-gusto:active { transform: scale(0.9); }
        
        /* Ocultar iconos de VR por defecto */
        .a-enter-vr { display: none !important; }
    </style>
</head>

<body>
    <div id="info-plato">CARGANDO MENÚ...</div>

    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">Anterior</button>
        <button class="btn-gusto" id="btn-next">Siguiente</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;" 
        embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model id="visor" position="0 0 0" rotation="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        // DIRECCIÓN DE LOS ASSETS (Repositorio separado)
        const URL_BASE = "https://raw.githubusercontent.com/Gusto3d-menu/gusto3d-assets/main/";

        const catalogo = [
            { 
                nombre: "MENÚ: Sándwich", 
                archivo: "food.glb", 
                escala: "0.5 0.5 0.5" 
            },
            { 
                nombre: "MENÚ: Postre", 
                archivo: "postre.glb", 
                escala: "0.8 0.8 0.8" 
            }
        ];

        let index = 0;
        const visor = document.querySelector("#visor");
        const texto = document.querySelector("#info-plato");

        // Función principal para cambiar de plato
        function actualizarPlato() {
            const item = catalogo[index];
            const urlFinal = URL_BASE + item.archivo;
            
            // Actualizamos la fuente del modelo y su tamaño
            visor.setAttribute("src", urlFinal);
            visor.setAttribute("scale", item.escala);
            texto.innerText = item.nombre;
            
            console.log("Cargando desde Assets:", urlFinal);
        }

        // Carga inicial tras una pequeña pausa para asegurar que A-Frame esté listo
        window.addEventListener('load', () => {
            setTimeout(actualizarPlato, 1000);
        });
