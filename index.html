<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Pro</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background-color: #0d1117; }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0d1117 0%, #000000 100%); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 3000;
            transition: opacity 0.8s ease;
        }

        .logo-gusto {
            width: 250px; height: auto; margin-bottom: 35px;
            filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.5));
            /* Evitamos que el icono de imagen rota se vea feo si falla */
            min-height: 100px;
        }

        .mensaje-carga {
            color: #ffffff; font-family: sans-serif; 
            margin-bottom: 25px; letter-spacing: 2px; font-size: 14px;
            font-weight: 300; text-transform: uppercase;
        }

        .loader-bar { width: 200px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        .loader-progress { width: 100%; height: 100%; background: #00d4ff; animation: loading 2s infinite; }

        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        #ui-overlay { position: fixed; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; gap: 30px; z-index: 1000; display: none; }
        .btn-gusto { padding: 18px 40px; background: #25D366; color: white; border: 2px solid white; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>

<body>
    <div id="loading-screen">
        <img src="logo-blanco.png" id="main-logo" class="logo-gusto" alt="Gustó3D">
        
        <div class="mensaje-carga">PREPARANDO EXPERIENCIA GUSTÓ3D</div>
        
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">←</button>
        <button class="btn-gusto" id="btn-next">→</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; filterMinCF: 0.00001; filterBeta: 0.1;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; precision: mediump;">
      
        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1.5"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model id="visor" rotation="90 0 0" position="0 -0.8 0.1" scale="1.2 1.2 1.2"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const loader = document.querySelector("#loading-screen");
        const ui = document.querySelector("#ui-overlay");
        const logo = document.getElementById('main-logo');

        // 1. Intentar cargar el logo con bypass de caché
        logo.src = "logo-blanco.png?v=" + Math.random();

        // 2. Función para quitar la pantalla de carga (Doble seguridad)
        function finalizarCarga() {
            loader.style.opacity = "0";
            setTimeout(() => {
                loader.style.display = "none";
                ui.style.display = "flex";
            }, 800);
        }

        // 3. Si la RA está lista, esperamos 3 segundos y quitamos la pantalla
        document.querySelector('a-scene').addEventListener('arReady', () => {
            setTimeout(finalizarCarga, 3500);
        });

        // 4. SEGURIDAD EXTRA: Si pasan 10 segundos y sigue la pantalla, la quitamos sí o sí
        setTimeout(() => {
            if (loader.style.display !== "none") finalizarCarga();
        }, 10000);

        // Lógica de modelos (Ajusta la URL a tu repo de assets)
        const URL_BASE = "https://raw.githubusercontent.com/Gusto3d-menu/gusto3d-assets/main/";
        const visor = document.querySelector("#visor");
        visor.setAttribute("src", URL_BASE + "food.glb");
    </script>
</body>
</html>
