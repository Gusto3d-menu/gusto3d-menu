<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Pro</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background-color: #000000; }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 3000;
            transition: opacity 0.8s ease;
        }

        .logo-gusto {
            width: 250px; height: auto; margin-bottom: 35px;
            /* Quitamos filtros complejos para asegurar visibilidad */
        }

        .mensaje-carga {
            color: #ffffff; font-family: sans-serif; 
            margin-bottom: 25px; letter-spacing: 2px; font-size: 14px;
            text-transform: uppercase; text-align: center;
        }

        /* UI */
        #ui-overlay { position: fixed; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; gap: 30px; z-index: 1000; display: none; }
        .btn-gusto { padding: 18px 40px; background: #25D366; color: white; border: 2px solid white; border-radius: 50px; font-weight: bold; }
    </style>
</head>

<body>
    <div id="loading-screen">
        <img src="logo-banco.jpg" id="main-logo" class="logo-gusto" alt="Logo">
        <div class="mensaje-carga">PREPARANDO EXPERIENCIA GUSTÓ3D</div>
    </div>

    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">←</button>
        <button class="btn-gusto" id="btn-next">→</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; filterMinCF: 0.00001; filterBeta: 0.1;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true;">
      
        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1.5"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model id="visor" rotation="90 0 0" position="0 -0.8 0.1" scale="1.2 1.2 1.2"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const loader = document.querySelector("#loading-screen");
        const ui = document.querySelector("#ui-overlay");
        const visor = document.querySelector("#visor");

        // Quitamos el modo "seguro" del logo para que use la ruta directa que funcionaba
        document.querySelector('a-scene').addEventListener('arReady', () => {
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => {
                    loader.style.display = "none";
                    ui.style.display = "flex";
                }, 800);
            }, 3000); 
        });

        // Carga de modelos
        const URL_BASE = "https://raw.githubusercontent.com/Gusto3d-menu/gusto3d-assets/main/";
        visor.setAttribute("src", URL_BASE + "food.glb");
    </script>
</body>
</html>
