<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Pro Ultra-Estable</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background: #000; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; transition: opacity 0.8s ease; }
        .logo-gusto { width: 200px; height: auto; margin-bottom: 30px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .mensaje-carga { color: #fff; font-family: sans-serif; margin-bottom: 20px; letter-spacing: 2px; font-size: 13px; text-transform: uppercase; text-align: center; }
        .loader-bar { width: 220px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .loader-progress { width: 0%; height: 100%; background: linear-gradient(90deg, #00d4ff, #25D366); animation: progress 6.5s linear forwards; }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        #plato-info { position: fixed; top: 40px; width: 100%; text-align: center; color: white; font-family: sans-serif; font-size: 22px; font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.9); z-index: 1000; opacity: 0; transition: 0.5s; }
        #plato-info.show { opacity: 1; transform: translateY(10px); }
        #ui-overlay { position: fixed; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; gap: 30px; z-index: 1000; opacity: 0; transition: 0.5s; }
        #ui-overlay.show { opacity: 1; }
        .btn-gusto { padding: 16px 28px; background: linear-gradient(45deg, #25D366, #128C7E); color: white; border: 2px solid #fff; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
    </style>
</head>

<body>
    <div id="loading-screen">
        <img src="logo-banco.jpg" class="logo-gusto" alt="Gustó3D">
        <div class="mensaje-carga" id="mensaje-carga">INICIANDO...</div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>

    <div id="plato-info"></div>

    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">←</button>
        <button class="btn-gusto" id="btn-next">→</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; filterMinCF: 0.001; filterBeta: 0.005; matrixSmoothing: 0.9;"
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true; physicallyCorrectLights: true; antialias: false; precision: mediump;">
      
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="model-container" position="0 0 0.1" rotation="90 0 0">
                <a-gltf-model id="visor" shadow="receive: true"></a-gltf-model>
            </a-entity>
        </a-entity>
        
        <a-light type="ambient" intensity="1.0"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1.2"></a-light>
    </a-scene>

    <script>
        const loader = document.getElementById("loading-screen");
        const ui = document.getElementById("ui-overlay");
        const visor = document.getElementById("visor");
        const modelContainer = document.getElementById("model-container");
        const mensajeCarga = document.getElementById("mensaje-carga");
        const platoInfo = document.getElementById("plato-info");
        
        let catalogo = [];
        let platoActual = 0;

        async function cargarMenu() {
            try {
                const response = await fetch('./menu.json');
                const datos = await response.json();
                catalogo = datos.platos;
                
                const mensajes = ["ESTABILIZANDO CÁMARA...", "FILTRANDO VIBRACIÓN...", "CARGANDO PLATOS...", "¡LISTO!"];
                let mIndex = 0;
                const mInterval = setInterval(() => {
                    if (mIndex < mensajes.length) { mensajeCarga.textContent = mensajes[mIndex]; mIndex++; }
                }, 1500);

                if (catalogo.length > 0) cambiarPlato(0);

                setTimeout(() => {
                    clearInterval(mInterval);
                    loader.style.opacity = "0";
                    setTimeout(() => { loader.style.display = "none"; ui.classList.add("show"); }, 800);
                }, 6500);

            } catch (error) { mensajeCarga.textContent = "ERROR DE DATOS"; }
        }

        function cambiarPlato(direccion) {
            if (catalogo.length === 0) return;
            platoActual = (platoActual + direccion + catalogo.length) % catalogo.length;
            const plato = catalogo[platoActual];

            // 1. Reducir escala del contenedor para la transición
            modelContainer.setAttribute("scale", "0.2 0.2 0.2");

            setTimeout(() => {
                // 2. Cambiar el modelo en el visor interno
                visor.setAttribute("gltf-model", plato.archivo);
                
                // 3. Fijar posición y rotación del contenedor estable
                modelContainer.setAttribute("position", plato.pos || "0 0 0.1");
                
                // 4. Aplicar rotación horizontal infinita al VISOR (no al contenedor)
                visor.setAttribute("animation__rotate", {
                    property: "rotation",
                    from: "0 0 0",
                    to: "0 360 0",
                    dur: plato.velocidad || 12000,
                    loop: true,
                    easing: "linear"
                });

                // 5. Animación de escala al CONTENEDOR
                modelContainer.setAttribute("animation__scale", {
                    property: "scale",
                    to: plato.escala,
                    dur: 1000,
                    easing: "easeOutQuad"
                });

                platoInfo.textContent = plato.nombre;
                platoInfo.classList.remove("show");
                setTimeout(() => platoInfo.classList.add("show"), 100);
            }, 200);
        }

        // 🛡️ ESTABILIZADOR FORZADO: Mantiene el contenedor centrado cada 33ms
        setInterval(() => {
            if (visor.object3D.visible && modelContainer) {
                // Forzamos al contenedor a no moverse bruscamente de su posición relativa
                const p = modelContainer.getAttribute('position');
                modelContainer.setAttribute('position', {x: 0, y: 0, z: p.z});
            }
        }, 33);

        document.getElementById("btn-prev").onclick = () => cambiarPlato(-1);
        document.getElementById("btn-next").onclick = () => cambiarPlato(1);
        document.addEventListener('DOMContentLoaded', cargarMenu);
    </script>
</body>
</html>
