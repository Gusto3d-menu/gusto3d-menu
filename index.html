<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gusto3D - Menú Premium</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap');

        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; position: fixed; background: #000;
            font-family: 'Poppins', sans-serif; color: white;
        }

        /* CARGA */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 3000; 
            transition: opacity 0.8s ease;
        }
        .mensaje-carga { color: #25D366; letter-spacing: 4px; font-size: 11px; margin-top: 20px; }

        /* PANTALLAS */
        .pantalla {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(circle at top, #1a1a2e 0%, #000 100%);
            z-index: 1000; opacity: 0; visibility: hidden; transition: 0.4s;
        }
        .pantalla.activa { opacity: 1; visibility: visible; }

        /* CATEGORIAS */
        .grid-categorias {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; width: 90%; max-width: 400px; margin-top: 30px;
        }
        .btn-categoria {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(37,211,102,0.3);
            border-radius: 20px; padding: 25px 10px; color: white; font-weight: 600;
            text-transform: uppercase; font-size: 11px; letter-spacing: 1px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .cat-icon { width: 45px; height: 45px; background: #25D366; border-radius: 12px; display: flex; align-items: center; justify-content: center; }

        /* CARRUSEL */
        #pantalla-platos { padding-top: 80px; }
        .carrusel-track { display: flex; transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); width: 100%; }
        .carrusel-slide { min-width: 100%; display: flex; justify-content: center; padding: 0 20px; }
        .plato-card {
            width: 100%; max-width: 300px; background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .plato-imagen-wrap { height: 220px; background: #111; position: relative; }
        .plato-imagen { width: 100%; height: 100%; object-fit: cover; }
        .plato-info { padding: 25px; }
        .btn-ver-ar {
            width: 100%; padding: 15px; background: #25D366; border: none;
            border-radius: 15px; color: black; font-weight: 700; cursor: pointer;
        }

        /* UI AR */
        #ui-ar { position: fixed; bottom: 30px; display: none; gap: 10px; z-index: 2000; }
        #btn-volver { position: fixed; top: 20px; left: 20px; z-index: 2500; background: #25D366; border: none; width: 40px; height: 40px; border-radius: 50%; display: none; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="mensaje-carga">GUSTO3D</div>
    </div>

    <button id="btn-volver">←</button>

    <!-- CATEGORIAS -->
    <div id="pantalla-categorias" class="pantalla activa">
        <h1 style="margin-top:80px; font-family:'Playfair Display'">MENÚ 3D</h1>
        <div class="grid-categorias">
            <button class="btn-categoria" onclick="abrirCategoria('Entradas')">ENTRADAS</button>
            <button class="btn-categoria" onclick="abrirCategoria('Plato Fuerte')">PLATOS FUERTES</button>
            <button class="btn-categoria" onclick="abrirCategoria('Postres')">POSTRES</button>
            <button class="btn-categoria" onclick="abrirCategoria('Bebidas')">BEBIDAS</button>
        </div>
    </div>

    <!-- PLATOS -->
    <div id="pantalla-platos" class="pantalla">
        <h2 id="titulo-categoria" style="color:#25D366"></h2>
        <div style="overflow:hidden; width:100%; flex:1; display:flex; align-items:center;">
            <div class="carrusel-track" id="carrusel-track"></div>
        </div>
    </div>

    <!-- UI AR -->
    <div id="ui-ar">
        <button onclick="cerrarAR()" style="padding:15px 30px; border-radius:30px; border:none; background:#fff;">CERRAR CÁMARA</button>
    </div>

    <!-- AR SCENE -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="contenedor-estabilizador" scale="0.01 0.01 0.01">
                <a-gltf-model id="visor" rotation="90 0 0"></a-gltf-model>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        let catalogo = [];
        let platosActuales = [];
        let indiceActual = 0;

        // Cargar datos
        async function init() {
            try {
                const res = await fetch('./menu.json');
                const data = await res.json();
                catalogo = data.platos;
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 800);
            } catch (e) { console.error("Error cargando JSON", e); }
        }

        function abrirCategoria(nombreCat) {
            const term = nombreCat.toLowerCase();
            platosActuales = catalogo.filter(p => p.categoria.toLowerCase() === term);
            
            const track = document.getElementById('carrusel-track');
            track.innerHTML = '';
            indiceActual = 0;
            track.style.transform = `translateX(0)`;

            platosActuales.forEach((plato, i) => {
                const slide = document.createElement('div');
                slide.className = 'carrusel-slide';
                slide.innerHTML = `
                    <div class="plato-card">
                        <div class="plato-imagen-wrap">
                            <img src="${plato.imagen}" class="plato-imagen">
                        </div>
                        <div class="plato-info">
                            <h3 style="margin:0">${plato.nombre}</h3>
                            <p style="font-size:12px; color:gray">${nombreCat}</p>
                            <button class="btn-ver-ar" onclick="iniciarAR(${catalogo.indexOf(plato)})">VER EN 3D</button>
                        </div>
                    </div>
                `;
                track.appendChild(slide);
            });

            document.getElementById('titulo-categoria').textContent = nombreCat;
            document.getElementById('pantalla-categorias').classList.remove('activa');
            document.getElementById('pantalla-platos').classList.add('activa');
            document.getElementById('btn-volver').style.display = 'block';
        }

        // Lógica de navegación del carrusel (Swipe simple)
        let startX = 0;
        document.getElementById('carrusel-track').addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.getElementById('carrusel-track').addEventListener('touchend', e => {
            const diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                if (diff > 0 && indiceActual < platosActuales.length - 1) indiceActual++;
                else if (diff < 0 && indiceActual > 0) indiceActual--;
                document.getElementById('carrusel-track').style.transform = `translateX(-${indiceActual * 100}%)`;
            }
        });

        document.getElementById('btn-volver').onclick = () => {
            document.getElementById('pantalla-platos').classList.remove('activa');
            document.getElementById('pantalla-categorias').classList.add('activa');
            document.getElementById('btn-volver').style.display = 'none';
        };

        async function iniciarAR(index) {
            const p = catalogo[index];
            const scene = document.querySelector('a-scene');
            const visor = document.getElementById('visor');
            
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById('btn-volver').style.display = 'none';
            document.getElementById('ui-ar').style.display = 'flex';

            visor.setAttribute('gltf-model', p.archivo);
            document.getElementById('contenedor-estabilizador').setAttribute('scale', p.escala);
            
            await scene.systems['mindar-image-system'].start();
        }

        function cerrarAR() {
            document.querySelector('a-scene').systems['mindar-image-system'].stop();
            document.getElementById('ui-ar').style.display = 'none';
            document.getElementById('pantalla-categorias').classList.add('activa');
        }

        window.onload = init;
    </script>
</body>
</html>
