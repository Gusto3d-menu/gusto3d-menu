<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Pro</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0d1117; }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0d1117; /* Color sólido primero para evitar parpadeos */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 3000;
        }

        .logo-gusto {
            width: 250px; height: auto; margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.5));
            /* Quitamos animaciones por ahora para asegurar que se vea */
        }

        .mensaje-carga { color: #ffffff; font-family: sans-serif; letter-spacing: 2px; font-size: 14px; text-transform: uppercase; }
    </style>
</head>

<body>
    <div id="loading-screen">
        <img id="logo-visual" class="logo-gusto" alt="Logo Gustó3D">
        <div class="mensaje-carga">PREPARANDO EXPERIENCIA GUSTÓ3D</div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; filterMinCF: 0.00001; filterBeta: 0.1;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model id="visor" rotation="90 0 0" position="0 -0.8 0.1" scale="1.2 1.2 1.2"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        // ESTA ES LA MAGIA: Forzamos al navegador a descargar la imagen nueva
        window.onload = function() {
            const miLogo = document.getElementById('logo-visual');
            // Al agregar ?v= y un número aleatorio, GitHub Pages se ve obligado a enviar el archivo nuevo
            miLogo.src = "logo-blanco.png?v=" + Math.random();
        };

        const visor = document.querySelector("#visor");
        const loader = document.querySelector("#loading-screen");

        // Cargar el primer modelo
        visor.setAttribute("src", "https://raw.githubusercontent.com/Gusto3d-menu/gusto3d-assets/main/food.glb");

        // Quitar pantalla de carga cuando la RA esté lista
        document.querySelector('a-scene').addEventListener('arReady', () => {
            setTimeout(() => {
                loader.style.display = "none";
            }, 3000); 
        });
    </script>
</body>
</html>
